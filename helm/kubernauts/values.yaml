replicaCount: 1

image:
  # Use the exact GHCR paths produced by CI (include the GitHub owner/org)
  backend: ghcr.io/c-brennan81/kubernauts/backend:main
  frontend: ghcr.io/c-brennan81/kubernauts/frontend:main
  pullPolicy: IfNotPresent
  # If you need image pull secrets (private images), list secret names here
  pullSecrets: []

service:
  type: ClusterIP
  backendPort: 8080
  frontendPort: 80

ingress:
  enabled: true
  host: kubernauts.local
  tls: false

game:
  mode: simulation  # simulation or cluster
  sessionNamespace: kubernauts-sessions
  sessionTtlMinutes: 30

resources:
  backend:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  frontend:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: kubernauts

