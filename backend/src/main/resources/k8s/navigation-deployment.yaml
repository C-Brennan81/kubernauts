apiVersion: apps/v1
kind: Deployment
metadata:
  name: nav-system
  labels:
    app: nav-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nav-system
  template:
    metadata:
      labels:
        app: nav-system
    spec:
      containers:
        - name: nav
          image: busybox
          command: ["sleep", "3600"]   # healthy — used for rollback scenarios
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
