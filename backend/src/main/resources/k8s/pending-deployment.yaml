apiVersion: apps/v1
kind: Deployment
metadata:
  name: navigation
  labels:
    app: navigation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navigation
  template:
    metadata:
      labels:
        app: navigation
    spec:
      nodeSelector:
        kubernetes.io/hostname: "node-that-does-not-exist"  # → Pending forever
      containers:
        - name: nav
          image: busybox
          command: ["sleep", "3600"]
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
