spring.application.name=kubernauts
server.port=8080

# H2
spring.datasource.url=jdbc:h2:mem:kubernauts
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# CORS (React dev server)
cors.allowed-origins=http://localhost:5173

# Game mode: simulation (default) or cluster
game.mode=simulation
game.session-namespace=kubernauts-sessions
game.session-ttl-minutes=30
