name: Publish Helm Chart

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3 etc
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm package helm/kubernauts --destination .helm-release

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy chart and update index
        run: |
          cp .helm-release/*.tgz gh-pages/
          helm repo index gh-pages/ --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release chart ${{ github.ref_name }}" || echo "Nothing to commit"
          git push
