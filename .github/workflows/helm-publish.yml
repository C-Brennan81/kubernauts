name: Publish Helm Chart

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3 etc
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          rm -rf .helm-release
          mkdir .helm-release
          helm package helm/kubernauts --destination .helm-release

      - name: Build gh-pages branch contents
        run: |
          rm -rf gh-pages
          mkdir gh-pages
          cp .helm-release/*.tgz gh-pages/
          helm repo index gh-pages/ --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Push to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd gh-pages
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release chart ${{ github.ref_name }}" || git commit --allow-empty -m "Release chart ${{ github.ref_name }}"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push -u origin gh-pages --force
